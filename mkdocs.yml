site_name: joshiayush.ai
site_url: https://joshiayush.github.io/nuro
repo_url: https://github.com/joshiayush/nuro
repo_name: joshiayush/nuro

hooks:
  - hooks/notebooks.py

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search
  - mkdocs-jupyter:
      include_source: true
      execute: false
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            members: true
            show_submodules: true

nav:
  - Home: index.md
  - Deep Learning Roadmap: deep-learning-roadmap.md
  - Deep Learning:
    - Neural Networks: dl/Neural_Networks.ipynb
  - Machine Learning:
    - Introduction to ML: ml/Introduction-to-ML.md
    - Descending into ML: ml/Descending-into-ML.md
    - Reducing Loss: ml/Reducing-Loss.md
    - Generalization: ml/Generalization.md
    - Training and Test Sets: ml/Training-and-Test-Sets.md
    - Validation Set: ml/Validation-Set.md
    - Representation: ml/Representation.md
    - Feature Crosses: ml/Feature-Crosses.md
    - Transform Your Data: ml/Transform-Your-Data.md
    - Regularization for Simplicity: ml/Regularization-for-Simplicity.md
    - Logistic Regression: ml/Logistic-Regression.md
    - Classification: ml/Classification.md
    - Regularization for Sparsity: ml/Regularization-for-Sparsity.md
    - Neural Networks: ml/Neural-Networks.md
    - Training Neural Networks: ml/Training-Neural-Networks.md
    - Linear Regression with a Real Dataset: ml/Linear-Regression-with-a-Real-Dataset.md
  - Prework:
    - Overview: prework/README.md
    - Linear Algebra: prework/linear-algebra/Linear_Algebra.ipynb
    - Calculus: prework/calculus/Calculus.ipynb
    - Probability: prework/statistics/Probability.ipynb
    - Statistics: prework/statistics/Statistics.ipynb
    - NumPy: prework/NumPy.md
    - Pandas DataFrame: prework/Pandas-DataFrame.md
    - Framing an ML Problem: prework/Framing-an-ML-problem.md
    - Introduction to ML Problem Framing: prework/Introduction-to-Machine-Learning-Problem-Framing.md
  - Algorithms:
    - Overview: algos/README.md
    - Pearson Correlation: algos/correlation/pearson_correlation/Pearson-correlation-coefficient.md
  - Projects:
    - Machine Learning:
      - K-Nearest Neighbors: projects/machine-learning/algorithms/K-Nearest-Neighbors-Algorithm.md
      - Naive Bayes: projects/machine-learning/algorithms/Naive-Bayes.md
    - Data Science:
      - Face Recognition — SVMs: projects/data-science/face-recognition/ipynb/Support-Vector-Machines.md
  - API Reference:
    - boolalg: api/boolalg.md
    - linear_model: api/linear_model.md
    - naive_bayes: api/naive_bayes.md
    - neighbors: api/neighbors.md
    - search: api/search.md
    - stats: api/stats.md
    - svm: api/svm.md

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_javascript:
  - js/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - css/extra.css
